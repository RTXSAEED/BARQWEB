<!DOCTYPE html>
<html lang="ar">
<head>
  <meta charset="UTF-8">
  <title>البرق - تواصل معنا</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <div>🚀 شركة البرق</div>
    <nav>
      <a href="index.html">الرئيسية</a>
      <a href="about.html">عن الشركة</a>
      <a href="contact.html">تواصل معنا</a>
      <a href="order.html">اطلب الآن</a>
    </nav>
  </header>

  <main class="container">
    <h1>تواصل معنا 📞</h1>
    <p>لأي استفسار أو سؤال، يمكنك التواصل معنا عبر:</p>
    <ul>
      <li>الواتساب: 963965245016</li>
      <li>الهاتف: 09XXXXXXXX</li>
      <li>البريد الإلكتروني: info@albarq.com</li>
    </ul>

    <h2>أو أرسل لنا رسالة مباشرة:</h2>

    <form id="contactForm">
      <label>الاسم:</label>
      <input type="text" id="contactName" required>

      <label>البريد الإلكتروني:</label>
      <input type="email" id="contactEmail" required>

      <label>الرسالة:</label>
      <textarea id="contactMessage" required></textarea>

      <div id="contactFormMessage"></div>

      <button type="submit">إرسال الرسالة</button>
    </form>
  </main>

  <script>
    const contactForm = document.getElementById('contactForm');
    const contactMessageDiv = document.getElementById('contactFormMessage');

    contactForm.addEventListener('submit', function(e){
      e.preventDefault();
      contactMessageDiv.innerHTML = "<p style='color:green;'>✅ تم إرسال الرسالة بنجاح!</p>";
      contactForm.reset();
    });
  </script>

</body>
</html>
